<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediFlow Chat - Dat lich phong kham</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient-bg"></div>

    <main class="layout">
      <section class="panel chat-panel" aria-label="Chat dat lich">
        <header class="panel-header chat-header">
          <div>
            <p class="kicker">AI Assistant</p>
            <h1>MediFlow Chat</h1>
          </div>
          <div class="chat-header-actions">
            <button id="new-chat-btn" type="button" class="new-chat-btn">
              Đoạn chat mới
            </button>
            <span class="status-dot">Đang hoạt động</span>
          </div>
        </header>

        <div id="chat-feed" class="chat-feed" aria-live="polite"></div>

        <form id="chat-form" class="chat-input-wrap">
          <input
            id="chat-input"
            type="text"
            placeholder="Nhap trieu chung hoac cau hoi... (Nhan Enter de gui)"
            autocomplete="off"
          />
          <button type="submit">Gửi</button>
        </form>
      </section>

      <section class="panel doctor-panel" aria-label="Bang bac si de xuat">
        <header class="panel-header">
          <p class="kicker">Doctor Board</p>
          <h2>Bác sĩ đề xuất</h2>
        </header>

        <div class="doctor-carousel-controls">
          <button id="prev-doctor" type="button" aria-label="Bác sĩ trước">◀</button>
          <p><span id="doctor-index">1</span>/<span id="doctor-total">1</span></p>
          <button id="next-doctor" type="button" aria-label="Bác sĩ tiếp">▶</button>
        </div>

        <ul id="doctor-list" class="doctor-list"></ul>

        <article id="doctor-detail" class="doctor-detail"></article>
      </section>
    </main>

    <div id="booking-modal" class="booking-modal" aria-hidden="true">
      <div class="booking-modal-backdrop" data-close-modal="true"></div>
      <section class="booking-modal-card" role="dialog" aria-modal="true" aria-labelledby="booking-title">
        <button id="booking-close" class="booking-close" type="button" aria-label="Dong">x</button>
        <h3 id="booking-title">Thông tin đặt lịch</h3>

        <form id="booking-form" class="booking-form">
          <label>
            <span>Ten</span>
            <input id="patient-name" type="text" required />
          </label>

          <label>
            <span>Gioi tinh</span>
            <select id="patient-gender" required>
              <option value="">Chọn giới tính</option>
              <option value="Nam">Nam</option>
              <option value="Nu">Nữ</option>
              <option value="Khac">Khác</option>
            </select>
          </label>

          <label>
            <span>Ngày sinh</span>
            <input id="patient-dob" type="date" required />
          </label>

          <label>
            <span>Số điện thoại</span>
            <input id="patient-phone" type="tel" required />
          </label>

          <div class="booking-actions">
            <button id="booking-confirm" type="submit">Xác nhận</button>
          </div>
        </form>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>

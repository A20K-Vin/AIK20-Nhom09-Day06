<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediFlow Chat - Đặt lịch phòng khám</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient-bg"></div>

    <main class="layout">
      <section class="panel chat-panel" aria-label="Chat đặt lịch">
        <header class="panel-header chat-header">
          <div>
            <p class="kicker">AI Assistant</p>
            <h1>MediFlow Chat</h1>
          </div>
          <span class="status-dot">Đang hoạt động</span>
          <button id="new-chat-btn" type="button">+ Cuộc trò chuyện mới</button>
        </header>

        <div id="chat-feed" class="chat-feed" aria-live="polite"></div>

        <form id="chat-form" class="chat-input-wrap">
          <input
            id="chat-input"
            type="text"
            placeholder="Nhập triệu chứng hoặc câu hỏi... (Nhấn Enter để gửi)"
            autocomplete="off"
          />
          <button type="submit">Gửi</button>
        </form>
      </section>

      <section class="panel doctor-panel" aria-label="Bảng bác sĩ đề xuất">
        <header class="panel-header">
          <p class="kicker">Doctor Board</p>
          <h2>Bác sĩ đề xuất</h2>
        </header>

        <div class="doctor-carousel-controls">
          <button id="prev-doctor" type="button" aria-label="Bác sĩ trước">◀</button>
          <p><span id="doctor-index">1</span>/<span id="doctor-total">1</span></p>
          <button id="next-doctor" type="button" aria-label="Bác sĩ tiếp">▶</button>
        </div>

        <ul id="doctor-list" class="doctor-list"></ul>

        <article id="doctor-detail" class="doctor-detail"></article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
